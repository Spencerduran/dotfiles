#################################
#        ENV VARIABLES          #
#################################
[env]
TERM = "xterm-256color"
draw_bold_text_with_bright_colors = 'true'

#################################
#       WINDOW SETTINGS         #
#################################
[window]
########opacity = 1
opacity = 1
decorations = "none" # Removes window decorations
# Window dimensions and padding
dimensions = { columns = 0, lines = 0 }
padding = { x = 0, y = 0 }
position = { x = 0, y = 0 }
dynamic_padding = true
dynamic_title = true

#################################
#       FONT SETTINGS           #
#################################
[font]
size = 14

# Normal font face
[font.normal]
# family = "Iosevka Nerd Font"  # Alternative font
family = "VictorMono Nerd Font"
style = "Regular"

# Bold font face
[font.bold]
# family = "Iosevka Nerd Font"
family = "VictorMono Nerd Font"
style = "Bold"

# Italic font face
[font.italic]
# family = "Iosevka Nerd Font"
family = "VictorMono Nerd Font"
style = "Italic"

# Bold italic font face
[font.bold_italic]
# family = "Iosevka Nerd Font"
family = "VictorMono Nerd Font"
style = "Bold Italic"

