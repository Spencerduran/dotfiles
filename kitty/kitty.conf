# Font
font_family      VictorMono Nerd Font Bold
bold_font        VictorMono Nerd Font Bold
italic_font      VictorMono Nerd Font Italic
bold_italic_font VictorMono Nerd Font Bold Italic
font_size        16.0

# Window
background_opacity      0.0
hide_window_decorations yes
window_padding_width    0

# Misc
term           xterm-256color
bold_is_bright yes

# Dracula-ish colors (matching alacritty)
foreground #f8f8f2
background #011628

color0  #21222c
color1  #ff5555
color2  #50fa7b
color3  #f1fa8c
color4  #bd93f9
color5  #ff79c6
color6  #8be9fd
color7  #f8f8f2
color8  #6272a4
color9  #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #d6acff
color13 #ff92df
color14 #a4ffff
color15 #ffffff
